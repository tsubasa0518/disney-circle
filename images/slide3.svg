<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8bbd9"/>
      <stop offset="40%" stop-color="#e1bee7"/>
      <stop offset="100%" stop-color="#b3e5fc"/>
    </linearGradient>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg3)"/>
  <rect width="800" height="450" fill="url(#center-glow)"/>
  <!-- Bubbles -->
  <g fill="none" stroke="white" stroke-opacity="0.4">
    <circle cx="80" cy="80" r="25" stroke-width="1.5"/>
    <circle cx="150" cy="200" r="40" stroke-width="1"/>
    <circle cx="700" cy="100" r="30" stroke-width="1.5"/>
    <circle cx="650" cy="280" r="50" stroke-width="1"/>
    <circle cx="400" cy="50" r="20" stroke-width="1.5"/>
    <circle cx="280" cy="380" r="35" stroke-width="1"/>
    <circle cx="550" cy="400" r="25" stroke-width="1.5"/>
  </g>
  <!-- Stars/sparkles -->
  <g fill="#c8a951" opacity="0.6">
    <path d="M100 120 L102 128 L110 130 L102 132 L100 140 L98 132 L90 130 L98 128Z"/>
    <path d="M680 150 L682 158 L690 160 L682 162 L680 170 L678 162 L670 160 L678 158Z"/>
    <path d="M400 380 L402 386 L408 388 L402 390 L400 396 L398 390 L392 388 L398 386Z" opacity="0.4"/>
  </g>
  <!-- Duffy bear silhouette (simple) -->
  <g transform="translate(60, 100)" opacity="0.15" fill="#8d6e63">
    <circle cx="70" cy="100" r="60"/>
    <circle cx="25" cy="45" r="32"/>
    <circle cx="115" cy="45" r="32"/>
    <ellipse cx="70" cy="115" rx="25" ry="18"/>
  </g>
  <!-- Decorative circles -->
  <circle cx="400" cy="225" r="130" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>
  <circle cx="400" cy="225" r="160" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <!-- Text -->
  <text x="400" y="155" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#7b1fa2" letter-spacing="4" opacity="0.8">DUFFY AND FRIENDS</text>
  <text x="400" y="215" text-anchor="middle" font-family="Georgia, serif" font-size="52" fill="#4a148c" font-weight="bold">Colorful</text>
  <text x="400" y="275" text-anchor="middle" font-family="Georgia, serif" font-size="52" fill="#4a148c" font-weight="bold">Happiness</text>
  <text x="400" y="325" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#7b1fa2" letter-spacing="2" opacity="0.9">20th Anniversary</text>
  <text x="400" y="375" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#4a148c" letter-spacing="5" opacity="0.6">TOKYO DISNEY SEA</text>
</svg>
